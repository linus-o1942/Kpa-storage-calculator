<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Omlin Consultancy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="top">
  <div class="top-inner">
    <a class="brand-row" href="login.html">
      <span class="brand-logo">
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="12" r="4.5" stroke="#C9A24A" stroke-width="2.2"/>
          <line x1="24" y1="16.5" x2="24" y2="38" stroke="#C9A24A" stroke-width="2.2"/>
          <line x1="15" y1="22" x2="33" y2="22" stroke="#C9A24A" stroke-width="2.2"/>
          <path d="M12 28c0 7 5.4 12.6 12 12.6S36 35 36 28" stroke="#C9A24A" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="brand-name">
        <span class="co">OMLIN CONSULTANCY LTD</span>
        <span class="tag">Shipping · Customs · Logistics</span>
      </span>
    </a>
    <nav class="top-nav">
      <a href="login.html">Log In</a>
      <a href="signup.html" class="active">Sign Up</a>
    </nav>
  </div>
</header>

<main style="max-width:420px;">
  <div class="panel" style="margin-top:36px;">
    <h2>Create your account</h2>
    <p class="sub">Sign up, then subscribe to unlock the Storage Charge Calculator.</p>

    <p class="msg error" id="errMsg"></p>

    <form id="signupForm">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" required autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn block" id="signupBtn">Create Account</button>
    </form>

    <p class="auth-link">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</main>

<footer class="app-footer"><p>Powered by Omlin Consultancy</p></footer>

<script type="module">
  import { signUp } from "./js/auth.js";

  const form = document.getElementById('signupForm');
  const btn = document.getElementById('signupBtn');
  const err = document.getElementById('errMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = "Creating account…";
    try{
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      await signUp(name, email, password);
      window.location.href = "subscribe.html";
    }catch(ex){
      err.textContent = friendlyError(ex.code);
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = "Create Account";
    }
  });

  function friendlyError(code){
    const map = {
      'auth/email-already-in-use': 'An account with that email already exists.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/weak-password': 'Password should be at least 6 characters.'
    };
    return map[code] || 'Could not create your account. Please check your details and try again.';
  }
</script>
</body>
</html>
